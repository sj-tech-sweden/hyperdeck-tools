name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  # ── Docker image → GHCR (multi-arch: amd64 + arm64) ──────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── macOS standalone binary ──────────────────────────────────────────
  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name hyperdeck-tools --add-data "app/frontend:app/frontend" --add-data "app/backend/plugins:app/backend/plugins" --add-data "app/backend/model_capability_profiles.json:app/backend" run.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hyperdeck-tools

  # ── Windows standalone binary ────────────────────────────────────────
  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name hyperdeck-tools.exe --add-data "app/frontend;app/frontend" --add-data "app/backend/plugins;app/backend/plugins" --add-data "app/backend/model_capability_profiles.json;app/backend" run.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hyperdeck-tools.exe
